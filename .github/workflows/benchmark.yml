name: Package Benchmark

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip pydantic
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-tests.txt ]; then pip install -r requirements-tests.txt; fi
    - name: Running parsing benchmark
      run: |
        pytest benchmark/benchmark_model_eff.py --benchmark-only --benchmark-sort=mean --benchmark-columns=min,mean,max,stddev,rounds
    - name: Running memory benchmark
      run: |
        pytest benchmark/benchmark_model_memory.py -s
